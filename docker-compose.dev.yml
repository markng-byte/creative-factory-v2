services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - apps/web/.env.example
    depends_on:
      - api

  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - apps/api/.env.example

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: creative_factory
      POSTGRES_PASSWORD: creative_factory
      POSTGRES_DB: creative_factory
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
